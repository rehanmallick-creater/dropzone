<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - DropZone</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <svg viewBox="0 0 40 40" width="28" height="28" style="vertical-align:middle;margin-right:6px">
        <line x1="20" y1="20" x2="6" y2="10" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="34" y2="10" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="6" y2="30" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="20" x2="34" y2="30" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="6" cy="10" r="4" fill="#1d4ed8"/>
        <circle cx="34" cy="10" r="4" fill="#1d4ed8"/>
        <circle cx="6" cy="30" r="4" fill="#1d4ed8"/>
        <circle cx="34" cy="30" r="4" fill="#1d4ed8"/>
        <ellipse cx="6" cy="10" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(-35 6 10)"/>
        <ellipse cx="34" cy="10" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(35 34 10)"/>
        <ellipse cx="6" cy="30" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(35 6 30)"/>
        <ellipse cx="34" cy="30" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(-35 34 30)"/>
        <rect x="14" y="17" width="12" height="7" rx="3" fill="#1e3a8a"/>
        <circle cx="20" cy="27" r="3" fill="#0ea5e9"/>
      </svg>
      DropZone
    </div>

    
    <div class="nav-links">
      <span id="userName" style="color:#4b5563;font-size:14px;"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="dashboard-container">

    <!-- Left Side -->
    <div class="dashboard-left">

      <!-- Place Order Card -->
      <div class="card">
        <h3>Place New Order</h3>
        <p class="card-subtitle">Enter delivery details below</p>
        <div class="alert" id="orderAlert"></div>
        <div class="form-group">
          <label>Pickup Location</label>
          <input type="text" id="pickup" placeholder="e.g. Boring Road, Patna">
        </div>
        <div class="form-group">
          <label>Drop Location</label>
          <input type="text" id="drop" placeholder="e.g. Bailey Road, Patna">
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="description" placeholder="e.g. Medicine package">
        </div>
        <div class="form-group">
          <label>Payload Weight (kg)</label>
          <input type="number" id="payload" placeholder="e.g. 2.5" min="0.1" step="0.1">
        </div>
        <button class="btn-primary" onclick="placeOrder()">Place Order</button>
      </div>

      <!-- My Orders -->
      <div class="card">
        <h3>My Orders</h3>
        <p class="card-subtitle">Track your deliveries</p>
        <div id="ordersList">
          <div class="loading">Loading orders...</div>
        </div>
      </div>

    </div>

    <!-- Right Side - AI Chatbot -->
    <div class="dashboard-right">
      <div class="card chatbot-card">
        <h3>AI Assistant</h3>
        <p class="card-subtitle">Ask me anything about your delivery</p>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-message bot">
            <div class="chat-bubble">Hi! I am your DropZone assistant. How can I help you today?</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Ask something..." onkeypress="handleChatKey(event)">
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

  </div>

  <script src="../js/dashboard.js"></script>
</body>
</html>
