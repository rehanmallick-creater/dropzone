<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DropZone</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
        <div class="nav-brand">
          <svg viewBox="0 0 40 40" width="28" height="28" style="vertical-align:middle;margin-right:6px">
            <line x1="20" y1="20" x2="6" y2="10" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="20" y1="20" x2="34" y2="10" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="20" y1="20" x2="6" y2="30" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="20" y1="20" x2="34" y2="30" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="6" cy="10" r="4" fill="#1d4ed8"/>
            <circle cx="34" cy="10" r="4" fill="#1d4ed8"/>
            <circle cx="6" cy="30" r="4" fill="#1d4ed8"/>
            <circle cx="34" cy="30" r="4" fill="#1d4ed8"/>
            <ellipse cx="6" cy="10" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(-35 6 10)"/>
            <ellipse cx="34" cy="10" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(35 34 10)"/>
            <ellipse cx="6" cy="30" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(35 6 30)"/>
            <ellipse cx="34" cy="30" rx="7" ry="2.5" fill="#2563eb" opacity="0.8" transform="rotate(-35 34 30)"/>
            <rect x="14" y="17" width="12" height="7" rx="3" fill="#1e3a8a"/>
            <circle cx="20" cy="27" r="3" fill="#0ea5e9"/>
          </svg>
          DropZone
        </div>


      <h2>Welcome back</h2>
      <p class="auth-subtitle">Login to your account</p>

      <div class="alert" id="alert"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="rehan@gmail.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button class="btn-auth" id="loginBtn" onclick="handleLogin()">
        Login
      </button>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
